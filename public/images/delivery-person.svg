  <!-- Collar V -->
  <path d="M48 82 L60 94 L72 82" fill="#3D9960"/>

  <!-- Neck -->
  <rect x="54" y="72" width="12" height="14" rx="4" fill="#F5C5A3"/>

  <!-- Head -->
